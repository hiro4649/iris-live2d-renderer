            console.log(`- securityLifecycleStatus: ${summary.securityLifecycleStatus?.status || 'missing'}`);
            console.log(`- reviewIndependenceStatus: ${summary.reviewIndependenceStatus?.status || 'missing'}`);
            console.log(`- v104SelfTestStatus: ${summary.v104SelfTestStatus?.status || 'missing'}`);
            console.log(`- claimToCodeVerifierStatus: ${summary.claimToCodeVerifierStatus?.status || 'missing'}`);
            console.log(`- architectureBoundaryLinterStatus: ${summary.architectureBoundaryLinterStatus?.status || 'missing'}`);
            console.log(`- acceptanceCriteriaMatrixStatus: ${summary.acceptanceCriteriaMatrixStatus?.status || 'missing'}`);
            console.log(`- riskGateStatus: ${summary.riskGateStatus?.status || 'missing'}`);
            console.log(`- evidenceReportV2Status: ${summary.evidenceReportV2Status?.status || 'missing'}`);
            console.log(`- githubStateHysteresisStatus: ${summary.githubStateHysteresisStatus?.status || 'missing'}`);
            console.log(`- targetHotfixPreservationAcrossRolloutStatus: ${summary.targetHotfixPreservationAcrossRolloutStatus?.status || 'missing'}`);
            console.log(`- externalBlockedTerminalStatus: ${summary.externalBlockedTerminalStatus?.status || 'missing'}`);
            console.log(`- taskBriefCompilerStatus: ${summary.taskBriefCompilerStatus?.status || 'missing'}`);
            console.log(`- bestOfNDecisionStatus: ${summary.bestOfNDecisionStatus?.status || 'missing'}`);
            console.log(`- environmentProfileStatus: ${summary.environmentProfileStatus?.status || 'missing'}`);
            console.log(`- agentsContextBudgetStatus: ${summary.agentsContextBudgetStatus?.status || 'missing'}`);
            console.log(`- evidenceAutoRepairHintStatus: ${summary.evidenceAutoRepairHintStatus?.status || 'missing'}`);
            console.log(`- baselineHealthStatus: ${summary.baselineHealthStatus?.status || 'missing'}`);
            console.log(`- evidenceContinuityStatus: ${summary.evidenceContinuityStatus?.status || 'missing'}`);
