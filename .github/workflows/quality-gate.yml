# CODEX_QUALITY_HARNESS_FILE v0.8.0
name: quality-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run target harness quality gate
        shell: bash
        env:
          CODEX_HARNESS_MODE: "target"
          CODEX_PROFILE_COMPAT_MODE: "off"
          CODEX_QUALITY_REPORT: "json"
          CODEX_SKIP_NPM: "1"
          CODEX_OPENAI_METHOD_REPORT: "json"
          CODEX_EVENT_NAME: ${{ github.event_name }}
          CODEX_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          CODEX_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          CODEX_PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          CODEX_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node --check scripts/codex-local-quality-gate.mjs
          node scripts/codex-secret-safety-scan.mjs
          gate_exit=0
          node scripts/codex-local-quality-gate.mjs > "$RUNNER_TEMP/codex-target-gate.txt" || gate_exit=$?
          node - "$RUNNER_TEMP/codex-target-gate.txt" "$gate_exit" <<'NODE'
          const fs = require('fs');
          const gateExit = Number(process.argv[3] || 0);
          const passed = gateExit === 0;
          const safeSummary = {
            status: passed ? 'pass' : 'fail',
            mode: 'target',
            safeSummaryOnly: true,
            valuesPrinted: false,
            qualityScoreStatus: { status: 'not_available' }
          };
          fs.writeFileSync('codex-quality-gate-safe-summary.json', JSON.stringify(safeSummary, null, 2));
          fs.writeFileSync('codex-failure-reasons.json', JSON.stringify(passed ? [] : [{ reasonCode: 'target_quality_gate_failed', safeMessage: 'Target quality gate failed.' }], null, 2));
          if (!passed) {
            console.error('::error title=codex-quality-gate::target_quality_gate_failed');
            process.exit(1);
          }
          console.log(`targetQualityGateStatus: ${safeSummary.status}`);
          NODE
      - name: Upload safe quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-quality-gate-safe-artifacts
          path: |
            codex-quality-gate-safe-summary.json
            codex-failure-reasons.json
          if-no-files-found: ignore
