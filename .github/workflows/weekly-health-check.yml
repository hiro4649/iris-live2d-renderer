# CODEX_QUALITY_HARNESS_FILE v0.8.1
name: weekly-health-check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  weekly-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run target harness health check
        shell: bash
        env:
          CODEX_HARNESS_MODE: "target"
          CODEX_PROFILE_COMPAT_MODE: "off"
          CODEX_QUALITY_REPORT: "json"
          CODEX_SKIP_NPM: "1"
        run: |
          set -euo pipefail
          node --check scripts/codex-local-quality-gate.mjs
          node scripts/codex-secret-safety-scan.mjs
          node scripts/codex-v080-self-test.mjs
          node scripts/codex-v081-self-test.mjs
          node scripts/codex-local-quality-gate.mjs > "$RUNNER_TEMP/codex-target-weekly.json"
          node - "$RUNNER_TEMP/codex-target-weekly.json" <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const required = [
            'secretScan',
            'agentsContextStatus',
            'environmentReadinessStatus',
            'changeClassificationStatus',
            'productVerificationStatus',
            'safeOutputScanStatus',
            'v080SelfTestStatus',
            'v081SelfTestStatus',
            'safeArtifactValidation',
            'outputShapeStatus',
            'targetQualityScoreStatus',
          ];
          const failures = [];
          for (const key of required) {
            const status = report[key]?.status || 'missing';
            console.log(`${key}: ${status}`);
            if (status !== 'pass' && status !== 'not_applicable') failures.push(`${key}=${status}`);
          }
          console.log(`report.status: ${report.status}`);
          console.log(`targetMergeReady: ${report.targetMergeReady ?? report.mergeReady}`);
          console.log(`targetQualityScoreStatus: ${report.targetQualityScoreStatus?.status || 'missing'}`);
          console.log(`targetQualityScore: ${report.targetQualityScoreStatus?.score ?? 'missing'}`);
          if (report.status !== 'pass') failures.push(`report.status=${report.status}`);
          if (report.targetQualityScoreStatus?.status !== 'pass') failures.push(`targetQualityScoreStatus=${report.targetQualityScoreStatus?.status || 'missing'}`);
          if (failures.length) {
            for (const item of failures) {
              const safe = String(item).replace(/[^A-Za-z0-9_.:= -]/g, '_').slice(0, 180);
              console.error(`::error title=codex-weekly-health::${safe}`);
            }
            process.exit(1);
          }
          NODE
