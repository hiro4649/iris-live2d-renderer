# CODEX_QUALITY_HARNESS_FILE v0.8.0
name: weekly-health-check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  weekly-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run target harness health check
        shell: bash
        env:
          CODEX_HARNESS_MODE: "target"
          CODEX_PROFILE_COMPAT_MODE: "off"
          CODEX_QUALITY_REPORT: "json"
          CODEX_SKIP_NPM: "1"
        run: |
          set -euo pipefail
          node --check scripts/codex-local-quality-gate.mjs
          node scripts/codex-secret-safety-scan.mjs
          node scripts/codex-local-quality-gate.mjs
